apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: honcho-ui

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

images:
  - name: ghcr.io/josephusit/honcho-ui
    newTag: latest
    newName: ghcr.io/josephusit/honcho-ui

commonLabels:
  app.kubernetes.io/name: honcho-ui
  app.kubernetes.io/part-of: honcho