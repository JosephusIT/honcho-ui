name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/honcho-ui

jobs:
  lint-and-test:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: ''
          cache-to: ''

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/fix/')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to k3s
        uses: yokaw/action-kubectl@v2
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
          args: apply -k k8s/overlays/production && kubectl rollout status deployment/honcho-ui -n honcho-ui --timeout=120s